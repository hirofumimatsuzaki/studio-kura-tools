<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Studio Kura Tools</title>
  <meta
    name="description"
    content="Tools for Studio Kura operations, exhibitions, and artist workflows."
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <p class="eyebrow">Studio Kura</p>
      <h1>Studio Kura Tools</h1>
      <p class="subtitle">Tools for Studio Kura operations, exhibitions, and artist workflows</p>
    </header>

    <main class="content">
      <section class="section" aria-labelledby="available-tools-title">
        <div class="section-heading">
          <h2 id="available-tools-title">Available Tools</h2>
          <p>Practical entry points for day-to-day residency, exhibition, and posting workflows.</p>
        </div>
        <div id="tool-grid" class="card-grid" aria-label="Available Studio Kura tools"></div>
      </section>

      <section class="section" aria-labelledby="coming-soon-title">
        <div class="section-heading">
          <h2 id="coming-soon-title">Coming Soon</h2>
          <p>Additional internal tools can be added here as the portal expands.</p>
        </div>
        <div id="coming-soon-grid" class="card-grid" aria-label="Upcoming Studio Kura tools"></div>
      </section>
    </main>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
